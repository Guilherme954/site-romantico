<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para você ❤️</title>

    <link rel="icon" type="image/png" href="./heart.png">
    
<style>

body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #0f001a, #2b0033);
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 20px;
    max-width: 700px;
}

h1 {
    font-size: 2.2em;
    color: #ff99cc;
}

/* ===== CARROSSEL ===== */

.carousel{
    position: relative;
    width: 260px;
    height: 340px;
    margin: 20px auto;
    overflow: hidden;
    border-radius: 05px;
    box-shadow: 0 0 25px rgba(255,105,180,0.4);
    background: rgba(0,0,0,0.15); /* só pra não ficar “vazio” nas bordas */
}

.carousel img{
    position: absolute;
    inset: 0;                 /* top:0 right:0 bottom:0 left:0 */
    width: 100%;
    height: 100%;
    padding: 12px;            /* padding interno */
    box-sizing: border-box;   /* faz o padding contar dentro do 100% */
    object-fit: contain;      /* mostra a foto inteira */
    object-position: center;  /* centraliza dentro do quadro */
    opacity: 0;
    transition: opacity 1s ease;
}

.carousel img.active{
    opacity: 1;
}

#text {
    font-size: 1.1em;
    line-height: 1.7em;
    white-space: pre-line;
    opacity: 0;
    transition: 1s;
}

button {
    margin-top: 30px;
    padding: 10px 20px;
    background: #ff4da6;
    border: none;
    border-radius: 20px;
    color: white;
    font-size: 1em;
    cursor: pointer;
    transition: 0.3s;
}

@keyframes tremer {
    0% { transform: translate(0,0); }
    25% { transform: translate(1px,-1px); }
    50% { transform: translate(-1px,1px); }
    75% { transform: translate(1px,1px); }
    100% { transform: translate(0,0); }
}

@keyframes brilhoBotao {
    from { box-shadow: 0 0 5px #ff4da6; }
    to { box-shadow: 0 0 20px #ff66b2; }
}

#botaoFinal {
    animation: tremer 0.4s infinite, brilhoBotao 1.5s infinite alternate;
}

.heart {
    position: fixed;
    bottom: -10px;
    color: #ff4da6;
    animation: subir linear infinite;
}

@keyframes subir {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

@media (max-width:600px){
    .carousel { width: 200px; height: 260px; }
    #text { font-size: 1em; }
}

</style>
</head>

<body>

<div class="container">

<h1>Para você ❤️</h1>

<div class="carousel">
    <img src="./foto1.png" class="active">
    <img src="./foto2.png">
    <img src="./foto3.png">
    <img src="./foto4.png">
</div>

<button id="botaoFinal">Clique aqui...</button>

<div id="text"></div>

<audio autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

<script>

// ===== CARROSSEL AUTOMÁTICO =====
let index = 0;
const imagens = document.querySelectorAll(".carousel img");

setInterval(() => {
    imagens[index].classList.remove("active");
    index = (index + 1) % imagens.length;
    imagens[index].classList.add("active");
}, 3000);


// ===== TEXTO APÓS CLICAR =====
const mensagem = `
Bê...

Todos os dias sou grato a Deus por ter colocado você no meu caminho, pois desde o dia em que a gente se conheceu você tem tornado minha vida mais feliz. Você tem me ensinado todos os dias o que é amar, cuidar e ser grato por tudo.

Enfim, você é a luz mais bela deste mundo, a pessoa mais foda que conheço, um exemplo de mulher, guerreira, batalhadora, esforçada.

Posso dizer com toda a certeza deste mundo que ter você ao meu lado tem sido a melhor coisa que me aconteceu em toda a minha vida. Cada momento que temos juntos só me faz ter mais certeza de que eu quero você pra vida toda. E sei que tenho muita coisa em mim pra melhorar e me fazer digno de ter uma mulher tão foda ao meu lado — e garanto que esforço pra fazer isso acontecer não falta.

Eu te amo, garotinha. Eu te amo nos dias bons, e eu te amo mais ainda nos dias ruins. Eu te amo nos momentos felizes e amo mais ainda nos momentos tristes. Eu te amo a todo momento.

Quero ser seu porto seguro, seu lugar de paz. Quero poder ser seu refúgio quando você quiser se esconder do mundo. Quero ser pra você tudo o que você é pra mim.

Não sou muito bom com as palavras, mas por você eu me esforço muito pra tentar expressar pelo menos 90% do que eu sinto por ti.

Quero que saiba que sou completamente apaixonado por você — e me apaixono mais a cada dia.
`;

const textElement = document.getElementById("text");
const botao = document.getElementById("botaoFinal");

botao.addEventListener("click", function(){

    this.style.animation = "none";
    this.style.display = "none";

    let i = 0;

    function typeWriter() {
        if (i < mensagem.length) {

            textElement.innerHTML += mensagem.charAt(i);

            let delay = 90;
            if (mensagem.charAt(i) === ".") delay = 600;
            if (mensagem.charAt(i) === "\n") delay = 800;

            i++;
            setTimeout(typeWriter, delay);
        }
    }

    textElement.style.opacity = "1";
    typeWriter();
});


// ===== CORAÇÕES =====
function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+10) + "px";
    heart.style.animationDuration = (Math.random()*3+4) + "s";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(), 7000);
}

setInterval(criarCoracao, 400);

</script>

</body>

</html>
